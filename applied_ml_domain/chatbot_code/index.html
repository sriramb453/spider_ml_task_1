<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manual PDF RAG Assistant</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0b1120;
      --card: #111827;
      --card-soft: #1f2937;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #7dd3fc;
      --border: rgba(148, 163, 184, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at top, rgba(56, 189, 248, 0.12), transparent 35%),
                  linear-gradient(180deg, #0b1120 0%, #02040d 100%);
      color: var(--text);
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .app {
      width: min(100%, 760px);
      min-height: 80vh;
      display: flex;
      flex-direction: column;
      background: rgba(17, 24, 39, 0.96);
      border: 1px solid var(--border);
      border-radius: 28px;
      box-shadow: 0 40px 120px rgba(0, 0, 0, 0.35);
      overflow: hidden;
    }

    .header {
      padding: 1.5rem 1.75rem;
      border-bottom: 1px solid rgba(148, 163, 184, 0.1);
    }

    .header h1 {
      margin: 0;
      font-size: 1.6rem;
      letter-spacing: -.02em;
    }

    .header p {
      margin: 0.75rem 0 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .upload-panel {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-top: 1rem;
      padding: 1rem;
      background: rgba(148, 163, 184, 0.06);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 20px;
    }

    .upload-panel input[type="file"] {
      background: rgba(15, 23, 42, 0.9);
      color: var(--text);
      font-size: 0.95rem;
    }

    .upload-panel button {
      border: none;
      border-radius: 999px;
      background: var(--accent);
      color: #020617;
      font-weight: 700;
      padding: 0.85rem 1.1rem;
      cursor: pointer;
    }

    .upload-status {
      width: 100%;
      color: var(--accent);
      font-size: 0.95rem;
      margin-top: 0.25rem;
    }

    .conversation {
      flex: 1;
      padding: 1.5rem;
      overflow-y: auto;
      display: grid;
      gap: 1rem;
    }

    .message {
      max-width: 82%;
      padding: 1rem 1.1rem;
      border-radius: 20px;
      line-height: 1.65;
      white-space: pre-wrap;
      font-size: 1rem;
    }

    .user {
      justify-self: end;
      background: linear-gradient(180deg, rgba(56, 189, 248, 0.14), rgba(56, 189, 248, 0.08));
      border: 1px solid rgba(56, 189, 248, 0.18);
      color: var(--text);
    }

    .assistant {
      justify-self: start;
      background: rgba(148, 163, 184, 0.08);
      border: 1px solid rgba(148, 163, 184, 0.14);
      color: var(--text);
    }

    .input-bar {
      padding: 1rem 1.5rem 1.5rem;
      border-top: 1px solid rgba(148, 163, 184, 0.1);
      background: rgba(15, 23, 42, 0.98);
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    .input-bar input {
      flex: 1;
      min-width: 0;
      padding: 1rem 1.15rem;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      background: rgba(15, 23, 42, 0.9);
      color: var(--text);
      font-size: 1rem;
      outline: none;
    }

    .input-bar button {
      border: none;
      border-radius: 999px;
      background: var(--accent);
      color: #020617;
      font-weight: 700;
      padding: 0.95rem 1.35rem;
      cursor: pointer;
    }

    .footer {
      padding: 0.85rem 1.5rem 1.5rem;
      color: var(--muted);
      font-size: 0.92rem;
      text-align: center;
    }

    @media (max-width: 640px) {
      .app {
        border-radius: 20px;
        min-height: 90vh;
      }

      .header, .input-bar, .footer {
        padding-left: 1rem;
        padding-right: 1rem;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="header">
      <h1>RAG Assistant</h1>
      <p>Ask any question. Answers are pulled from the loaded research database.</p>
    </div>

    <div class="conversation" id="conversation">
      <div class="message assistant">Hello — ask me anything about your research papers.</div>
    </div>

    <div class="input-bar">
      <input id="queryInput" type="text" placeholder="Type your question..." autocomplete="off" />
      <button onclick="submitQuery()">Send</button>
    </div>

    <div class="footer">Backend: http://127.0.0.1:8000/api/query</div>
  </div>

  <script>
    const conversationEl = document.getElementById('conversation');
    const queryInput = document.getElementById('queryInput');

    async function submitQuery() {
      const question = queryInput.value.trim();
      if (!question) return;

      addMessage('user', question);
      queryInput.value = '';

      const loading = addMessage('assistant', 'Thinking...');
      loading.dataset.loading = 'true';

      try {
        const response = await fetch('http://127.0.0.1:8000/api/query', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });

        const data = await response.json();
        if (!response.ok) {
          throw new Error(data.detail || 'Backend error');
        }

        let answerText = data.answer || 'No answer returned.';
        if (Array.isArray(data.sources) && data.sources.length) {
          answerText += '\n\nSources: ' + data.sources.join(', ');
        }

        updateMessage(loading, answerText);
      } catch (error) {
        updateMessage(loading, 'Error: ' + error.message);
      }
    }

    function addMessage(type, text) {
      const msg = document.createElement('div');
      msg.className = `message ${type}`;
      msg.textContent = text;
      conversationEl.appendChild(msg);
      conversationEl.scrollTop = conversationEl.scrollHeight;
      return msg;
    }

    function updateMessage(element, text) {
      element.textContent = text;
      delete element.dataset.loading;
      conversationEl.scrollTop = conversationEl.scrollHeight;
    }

    queryInput.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') submitQuery();
    });
  </script>
</body>
</html>
